<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveEasy Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>DriveEasy Car Rental</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Cars</a></li>
                <li><a href="#">Booking</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>Rent Your Dream Car Today</h2>
        <p>Affordable, reliable, and luxury cars available.</p>
        <button onclick="showMessage()">Book Now</button>
    </section>

    <section class="cars">
        <div class="card">
            <h3>Toyota Corolla</h3>
            <p>$45/day</p>
        </div>

        <div class="card">
            <h3>BMW X5</h3>
            <p>$120/day</p>
        </div>

        <div class="card">
            <h3>Mercedes C-Class</h3>
            <p>$150/day</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 DriveEasy Car Rental</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
