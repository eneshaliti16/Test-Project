
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Cars | Contact Us</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class="contact-section">

    <div class="contact-container">

        <!-- Contact Information -->
        <div class="contact-info">
            <h2>Kontaktoni</h2>
            <p>
                Have questions about our rental cars? Contact us and our team
                will help you find the perfect vehicle.
            </p>

            <div class="info-item">
                <i class="fas fa-user"></i>
                <span>Ledijon Pllana</span>
            </div>

            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span></span>
            </div>

            <div class="info-item">
                <i class="fas fa-phone"></i>
                <span>+383 44 123 456</span>
            </div>

            <div class="info-item">
                <i class="fas fa-location-dot"></i>
                <span>Prishtina, Kosov</span>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Dergo Mesazh</h2>

            <form id="contactForm">

                <div class="input-box">
                    <input
                        type="text"
                        id="name"
                        placeholder="Emri"
                        required>
                </div>

                <div class="input-box">
                    <input
                        type="text"
                        id="surname"
                        placeholder="Mbiemri"
                        required>
                </div>

                <div class="input-box">
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required>
                </div>

                <div class="input-box">
                    <textarea
                        id="message"
                        placeholder="Mesazh shtes..."
                        required></textarea>
                </div>

                <button type="submit" class="btn">
                    Dergo
                </button>

                <div id="success" class="success"></div>
                <div id="error" class="error"></div>

            </form>
        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
